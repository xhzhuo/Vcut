<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCut - AI 视频剪辑</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f; color: #e0e0e0;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1a1a1a; border-radius: 16px; padding: 40px;
    width: 100%; max-width: 860px; box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: #111; border-radius: 10px; padding: 4px; }
  .tab {
    flex: 1; padding: 10px; text-align: center; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    color: #888; transition: all 0.2s; border: none; background: transparent;
  }
  .tab.active { background: #2a2a2a; color: #e0e0e0; }
  .tab:hover:not(.active) { color: #bbb; }

  /* Page containers */
  .page { display: none; }
  .page.active { display: block; }

  /* Brand grid */
  .brand-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .brand-card {
    background: #222; border: 2px solid #333; border-radius: 12px;
    padding: 20px; cursor: pointer; transition: all 0.2s;
  }
  .brand-card:hover { border-color: #4a9eff; background: #1a2a3a; }
  .brand-card.selected { border-color: #4a9eff; background: #1a3a5c; }
  .brand-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .brand-info { color: #888; font-size: 13px; }
  .no-xlsx { opacity: 0.5; pointer-events: none; }

  /* Config form */
  .config-section { display: none; }
  .config-section.active { display: block; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; }
  .form-input {
    width: 100%; padding: 10px 14px; background: #111; border: 1px solid #333;
    border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: #4a9eff; }
  textarea.form-input { resize: vertical; font-family: inherit; line-height: 1.5; }
  .label-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .label-tag {
    font-size: 13px; padding: 6px 14px; border-radius: 16px;
    background: #222; color: #aaa; border: 1px solid #333;
    cursor: grab; user-select: none; transition: all 0.15s;
  }
  .label-tag.dragging { opacity: 0.4; }
  .label-tag.drag-over { border-color: #4a9eff; background: #1a3a5c; }

  /* Checkbox */
  .checkbox-group { display: flex; align-items: center; gap: 10px; }
  .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: #4a9eff; }
  .checkbox-group label { margin: 0; font-size: 14px; color: #ccc; }
  .goal-input { margin-top: 12px; display: none; }
  .goal-input.active { display: block; }

  /* Toggle Switch */
  .toggle-switch { position: relative; width: 44px; height: 24px; display: inline-block; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: #333; border-radius: 24px; cursor: pointer; transition: all 0.2s;
  }
  .toggle-slider::before {
    content: ""; position: absolute; width: 18px; height: 18px;
    left: 3px; bottom: 3px; background: #888; border-radius: 50%; transition: all 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: #4a9eff; }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); background: #fff; }

  /* Buttons */
  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 8px;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: #4a9eff; color: #fff; }
  .btn-primary:hover { background: #3a8eef; }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-sm {
    padding: 8px 16px; font-size: 13px; font-weight: 500; border-radius: 6px;
    border: none; cursor: pointer; transition: all 0.2s;
  }
  .btn-back {
    background: transparent; color: #888; border: 1px solid #333;
    padding: 10px 20px; border-radius: 8px; font-size: 14px;
    cursor: pointer; margin-top: 12px; width: auto;
  }
  .btn-back:hover { border-color: #555; color: #ccc; }

  /* Progress */
  .progress-section { display: none; }
  .progress-section.active { display: block; }
  .progress-bar-bg {
    width: 100%; height: 8px; background: #222; border-radius: 4px;
    overflow: hidden; margin: 16px 0;
  }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, #4a9eff, #6cb8ff);
    border-radius: 4px; transition: width 0.5s ease; width: 0%;
  }
  .stage-text { color: #888; font-size: 14px; margin-bottom: 24px; }
  .stages { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .stage-tag {
    font-size: 12px; padding: 4px 10px; border-radius: 12px;
    background: #222; color: #666;
  }
  .stage-tag.active { background: #1a3a5c; color: #4a9eff; }
  .stage-tag.done { background: #1a3c2a; color: #4caf50; }

  /* Done / Error */
  .done-section { display: none; text-align: center; }
  .done-section.active { display: block; }
  .done-icon { font-size: 64px; margin-bottom: 16px; }
  .btn-download {
    background: #2d7d46; color: #fff; display: inline-block;
    padding: 12px 32px; border-radius: 8px; text-decoration: none;
    font-weight: 600; transition: background 0.2s; margin-top: 16px;
  }
  .btn-download:hover { background: #236b38; }
  .btn-retry {
    background: transparent; color: #888; border: 1px solid #333;
    display: inline-block; padding: 10px 24px; border-radius: 8px;
    text-decoration: none; font-size: 14px; margin-top: 12px; cursor: pointer;
  }
  .btn-retry:hover { border-color: #555; color: #ccc; }
  .error-text { color: #ff6b6b; font-size: 13px; margin: 12px 0; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; background: rgba(255,107,107,0.08); border-radius: 8px; padding: 12px 16px; text-align: left; font-family: 'Cascadia Code', 'Fira Code', monospace; }
  .storage-bar { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; font-size: 13px; color: #aaa; }
  .storage-bar .bar-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .storage-bar .bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .storage-bar .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .storage-bar .bar-fill.ok { background: #4a9eff; }
  .storage-bar .bar-fill.warn { background: #f0a020; }
  .storage-bar .bar-fill.full { background: #ff6b6b; }
  .storage-bar .bar-label { min-width: 80px; }
  .storage-bar .bar-value { min-width: 120px; text-align: right; font-variant-numeric: tabular-nums; }

  /* Section titles */
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .config-summary {
    background: #111; border-radius: 8px; padding: 16px; margin-bottom: 20px;
    font-size: 13px; color: #aaa; line-height: 1.8;
  }
  .config-summary strong { color: #e0e0e0; }

  /* Management page */
  .brand-list { margin-bottom: 24px; }
  .brand-row {
    display: flex; align-items: center; justify-content: space-between;
    background: #222; border-radius: 10px; padding: 14px 18px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s; border: 2px solid transparent;
  }
  .brand-row:hover { border-color: #333; }
  .brand-row.expanded { border-color: #4a9eff; }
  .brand-row-left { display: flex; align-items: center; gap: 12px; }
  .brand-row-name { font-weight: 600; font-size: 15px; }
  .brand-row-meta { color: #888; font-size: 13px; }
  .brand-actions { display: flex; gap: 8px; }
  .btn-icon {
    background: transparent; border: 1px solid #333; color: #888;
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-icon:hover { border-color: #555; color: #ccc; }
  .btn-icon.danger:hover { border-color: #ff6b6b; color: #ff6b6b; }

  /* File list (expanded) */
  .file-panel {
    display: none; background: #111; border-radius: 0 0 10px 10px;
    margin-top: -10px; margin-bottom: 8px; padding: 16px 18px;
    border: 2px solid #4a9eff; border-top: none;
  }
  .file-panel.active { display: block; }
  .file-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid #222;
  }
  .file-row:last-child { border-bottom: none; }
  .file-name { font-size: 13px; color: #ccc; }
  .file-size { font-size: 12px; color: #666; margin-left: 8px; }
  .file-type {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    margin-left: 8px;
  }
  .file-type.xlsx { background: #1a3c2a; color: #4caf50; }
  .file-type.video { background: #1a2a5c; color: #4a9eff; }
  .btn-delete-file {
    background: transparent; border: none; color: #666;
    cursor: pointer; font-size: 16px; padding: 4px 8px;
    transition: color 0.2s;
  }
  .btn-delete-file:hover { color: #ff6b6b; }

  /* Upload area */
  .upload-row {
    display: flex; gap: 8px; margin-top: 12px; align-items: center;
  }
  .upload-btn {
    background: #222; border: 1px dashed #444; color: #888;
    padding: 10px 20px; border-radius: 8px; cursor: pointer;
    font-size: 13px; transition: all 0.2s; flex: 1; text-align: center;
  }
  .upload-btn:hover { border-color: #4a9eff; color: #4a9eff; }
  .upload-btn input { display: none; }

  /* New brand */
  .new-brand-row {
    display: flex; gap: 8px; margin-bottom: 24px;
  }
  .new-brand-row input {
    flex: 1; padding: 10px 14px; background: #111; border: 1px solid #333;
    border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none;
  }
  .new-brand-row input:focus { border-color: #4a9eff; }

  /* Output page */
  .brand-select {
    width: 100%; padding: 10px 14px; background: #111; border: 1px solid #333;
    border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none;
    margin-bottom: 20px; cursor: pointer;
  }
  .brand-select:focus { border-color: #4a9eff; }
  .output-card {
    background: #222; border-radius: 12px; margin-bottom: 16px; overflow: hidden;
    border: 1px solid #333;
  }
  .output-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; cursor: pointer; transition: background 0.2s;
  }
  .output-header:hover { background: #2a2a2a; }
  .output-name { font-weight: 600; font-size: 14px; }
  .output-size { color: #666; font-size: 12px; margin-left: 8px; }
  .output-time { color: #666; font-size: 12px; }
  .output-actions { display: flex; gap: 6px; }
  .output-body {
    display: none; padding: 0 18px 18px; border-top: 1px solid #333;
  }
  .output-body.active { display: block; padding-top: 16px; }

  /* Edit plan table */
  .plan-table {
    width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px;
  }
  .plan-table th {
    text-align: left; padding: 8px 10px; background: #1a1a1a;
    color: #888; font-weight: 500; border-bottom: 1px solid #333;
  }
  .plan-table td {
    padding: 8px 10px; border-bottom: 1px solid #1a1a1a; color: #ccc;
  }
  .plan-table tr:hover td { background: #1a1a1a; }
  .plan-role {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: #1a3a5c; color: #4a9eff;
  }
  .plan-reason { color: #888; font-size: 12px; max-width: 200px; }

  /* Feedback */
  .feedback-section {
    background: #1a1a1a; border-radius: 8px; padding: 16px; margin-top: 12px;
  }
  .feedback-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #aaa; }
  .rating-stars { display: flex; gap: 4px; margin-bottom: 12px; }
  .star {
    font-size: 24px; cursor: pointer; color: #333; transition: color 0.15s;
    background: none; border: none; padding: 0;
  }
  .star.filled { color: #f5a623; }
  .star:hover { color: #f5a623; }
  .feedback-textarea {
    width: 100%; min-height: 80px; padding: 10px 14px; background: #111;
    border: 1px solid #333; border-radius: 8px; color: #e0e0e0;
    font-size: 13px; outline: none; resize: vertical; font-family: inherit;
  }
  .feedback-textarea:focus { border-color: #4a9eff; }
  .feedback-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .feedback-tag {
    font-size: 12px; padding: 4px 12px; border-radius: 12px;
    background: #222; color: #888; border: 1px solid #333;
    cursor: pointer; transition: all 0.15s;
  }
  .feedback-tag.selected { background: #1a3a5c; color: #4a9eff; border-color: #4a9eff; }
  .feedback-saved { color: #4caf50; font-size: 12px; margin-top: 8px; display: none; }
  .btn-feedback {
    padding: 8px 20px; background: #4a9eff; color: #fff; border: none;
    border-radius: 6px; font-size: 13px; cursor: pointer; margin-top: 8px;
    transition: background 0.2s;
  }
  .btn-feedback:hover { background: #3a8eef; }

  /* Login Page */
  #login-page { display: none; }
  #login-page.active { display: flex; }
  #app { display: none; }
  #app.active { display: block; }
  .login-card {
    background: #1a1a1a; border-radius: 16px; padding: 48px 40px;
    width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    text-align: center;
  }
  .login-card h1 { margin-bottom: 8px; }
  .login-card .subtitle { margin-bottom: 32px; }
  .login-error { color: #ff5555; font-size: 13px; margin-bottom: 12px; display: none; }
  .logout-btn {
    background: transparent; color: #888; border: 1px solid #333;
    padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    transition: all 0.2s; margin-left: auto;
  }
  .logout-btn:hover { color: #e0e0e0; border-color: #666; }
</style>
</head>
<body>

<!-- Login Page -->
<div id="login-page" style="min-height:100vh; align-items:center; justify-content:center;">
  <div class="login-card">
    <h1>VCut</h1>
    <p class="subtitle">AI 驱动的自动视频剪辑</p>
    <div class="login-error" id="login-error"></div>
    <div class="form-group">
      <input class="form-input" id="login-user" type="text" placeholder="用户名" autocomplete="username">
    </div>
    <div class="form-group">
      <input class="form-input" id="login-pass" type="password" placeholder="密码" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="login-btn">登录</button>
  </div>
</div>

<!-- Main App -->
<div id="app">
<div class="card">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div>
      <h1>VCut</h1>
      <p class="subtitle">AI 驱动的自动视频剪辑</p>
    </div>
    <button class="logout-btn" id="logout-btn" style="display:none;" onclick="doLogout()">登出</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-page="edit" onclick="switchTab('edit')">剪辑</button>
    <button class="tab" data-page="manage" onclick="switchTab('manage')">素材管理</button>
    <button class="tab" data-page="output" onclick="switchTab('output')">成品管理</button>
  </div>

  <!-- ==================== EDIT PAGE ==================== -->
  <div class="page active" id="page-edit">

    <!-- Step 1: Brand Selection -->
    <div id="brand-section">
      <p class="section-title">选择品牌</p>
      <div class="brand-grid" id="brand-grid"></div>
      <div id="no-brands" style="display:none; color:#888; text-align:center; padding:40px 0;">
        暂无品牌数据，请先到「素材管理」创建品牌并上传视频
      </div>
    </div>

    <!-- Step 2: Config -->
    <div class="config-section" id="config-section">
      <p class="section-title">配置剪辑参数</p>
      <div class="config-summary" id="config-summary"></div>

      <div class="form-group">
        <label>标签顺序（拖拽排序）</label>
        <div class="label-tags" id="label-tags"></div>
      </div>

      <div class="form-group">
        <label>生成变体数量</label>
        <input class="form-input" id="variants-input" type="number" min="1" max="10" value="1">
      </div>

      <div class="form-group">
        <label>剪辑目标</label>
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
          <select class="form-input" id="prompt-select" style="flex:1;" onchange="applyPrompt()">
            <option value="">选择预设 Prompt（可选）</option>
          </select>
        </div>
        <textarea class="form-input" id="goal-input" rows="3" placeholder="描述剪辑目标，例如：突出产品卖点的15秒短视频，台词衔接自然"></textarea>
      </div>

      <div class="form-group" style="display:flex; align-items:center; gap:10px;">
        <label class="toggle-switch">
          <input type="checkbox" id="unique-src-toggle">
          <span class="toggle-slider"></span>
        </label>
        <label for="unique-src-toggle" style="margin:0; cursor:pointer;">每个标签来自不同视频来源</label>
      </div>

      <button class="btn btn-primary" id="start-btn">开始剪辑</button>
      <button class="btn-back" id="back-btn">返回选择品牌</button>
    </div>

    <!-- Step 3: Running -->
    <div class="progress-section" id="progress-section">
      <p class="section-title" id="progress-title">正在剪辑</p>
      <div class="stages">
        <span class="stage-tag" data-stage="starting">准备中</span>
        <span class="stage-tag" data-stage="segments">素材解析</span>
        <span class="stage-tag" data-stage="transcripts">语音识别</span>
        <span class="stage-tag" data-stage="strategy">策略生成</span>
        <span class="stage-tag" data-stage="render">视频渲染</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="stage-text" id="stage-text">准备中...</div>
    </div>

    <!-- Step 4: Done -->
    <div class="done-section" id="done-section">
      <div class="done-icon">&#10003;</div>
      <p style="font-size:18px; font-weight:600; margin-bottom:8px;">剪辑完成</p>
      <p style="color:#888; font-size:14px; margin-bottom:16px;" id="done-info"></p>
      <a class="btn-download" id="download-btn" href="#">下载视频</a>
      <br>
      <button class="btn-retry" onclick="resetUI()">继续剪辑</button>
    </div>

    <!-- Error -->
    <div class="done-section" id="error-section">
      <div class="done-icon" style="color:#ff6b6b;">&#10007;</div>
      <p style="font-size:18px; font-weight:600; margin-bottom:8px;">剪辑失败</p>
      <pre class="error-text" id="error-text"></pre>
      <button class="btn-retry" onclick="resetUI()">重试</button>
    </div>
  </div>

  <!-- ==================== MANAGE PAGE ==================== -->
  <div class="page" id="page-manage">
    <p class="section-title">素材管理</p>
    <div class="storage-bar" id="storage-inputs"></div>

    <div class="new-brand-row">
      <input id="new-brand-input" type="text" placeholder="输入新品牌名称">
      <button class="btn-sm btn-primary" style="background:#4a9eff;color:#fff;" onclick="createBrand()">创建</button>
    </div>

    <div class="brand-list" id="manage-brand-list"></div>
  </div>

  <!-- ==================== OUTPUT PAGE ==================== -->
  <div class="page" id="page-output">
    <p class="section-title">成品管理</p>
    <div class="storage-bar" id="storage-output"></div>
    <select class="brand-select" id="output-brand-select" onchange="loadOutputs()">
      <option value="">选择品牌查看成品</option>
    </select>
    <div id="output-list"></div>
  </div>

</div>
</div><!-- /app -->

<script>
// ==================== AUTH ====================
function showLogin() {
  document.getElementById('login-page').classList.add('active');
  document.getElementById('app').classList.remove('active');
}
function showApp() {
  document.getElementById('login-page').classList.remove('active');
  document.getElementById('app').classList.add('active');
  document.getElementById('logout-btn').style.display = '';
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true; btn.textContent = '登录中...'; errEl.style.display = 'none';
  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('login-user').value,
        password: document.getElementById('login-pass').value,
      })
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || '登录失败'); }
    showApp();
    loadBrands();
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  } finally { btn.disabled = false; btn.textContent = '登录'; }
});

document.getElementById('login-pass').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

const _origFetch = window.fetch;
window.fetch = async function(...args) {
  const resp = await _origFetch.apply(this, args);
  if (resp.status === 401 && !args[0].includes('/api/login') && !args[0].includes('/api/auth/status')) {
    showLogin();
    throw new Error('未登录');
  }
  return resp;
};

function renderLabelTags() {
  const container = document.getElementById('label-tags');
  container.innerHTML = '';
  brandLabels.forEach((label, idx) => {
    const tag = document.createElement('span');
    tag.className = 'label-tag';
    tag.textContent = label;
    tag.draggable = true;
    tag.dataset.index = idx;
    tag.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', idx); tag.classList.add('dragging'); });
    tag.addEventListener('dragend', () => tag.classList.remove('dragging'));
    tag.addEventListener('dragover', e => { e.preventDefault(); tag.classList.add('drag-over'); });
    tag.addEventListener('dragleave', () => tag.classList.remove('drag-over'));
    tag.addEventListener('drop', e => {
      e.preventDefault(); tag.classList.remove('drag-over');
      const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
      const toIdx = parseInt(tag.dataset.index);
      if (fromIdx !== toIdx) { brandLabels.splice(toIdx, 0, brandLabels.splice(fromIdx, 1)[0]); renderLabelTags(); }
    });
    container.appendChild(tag);
  });
}

document.getElementById('back-btn').addEventListener('click', () => showSection('brand'));

document.getElementById('start-btn').addEventListener('click', async () => {
  if (!selectedBrand || brandLabels.length === 0) return;
  const btn = document.getElementById('start-btn');
  btn.disabled = true; btn.textContent = '提交中...';
  const body = { brand: selectedBrand, labels: brandLabels, variants: parseInt(document.getElementById('variants-input').value) || 1 };
  const goal = document.getElementById('goal-input').value.trim();
  if (goal) body.goal = goal;
  body.unique_src_video = document.getElementById('unique-src-toggle').checked;
  try {
    const resp = await fetch('/api/tasks', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail || '请求失败'); }
    const data = await resp.json();
    currentTaskId = data.id;
    document.getElementById('progress-title').textContent = `正在剪辑 - ${selectedBrand}`;
    showSection('progress'); pollStatus();
  } catch (e) { showError(e.message); }
  finally { btn.disabled = false; btn.textContent = '开始剪辑'; }
});

async function pollStatus() {
  if (!currentTaskId) return;
  try {
    const resp = await fetch(`/api/tasks/${currentTaskId}`);
    const data = await resp.json();
    updateProgress(data.stage, data.progress);
    if (data.status === 'done') { showDone(data); return; }
    if (data.status === 'failed') { showError(data.error || '未知错误'); return; }
    pollTimer = setTimeout(pollStatus, 1500);
  } catch (e) { pollTimer = setTimeout(pollStatus, 3000); }
}

function showSection(name) {
  document.getElementById('brand-section').style.display = name === 'brand' ? 'block' : 'none';
  document.getElementById('config-section').classList.toggle('active', name === 'config');
  document.getElementById('progress-section').classList.toggle('active', name === 'progress');
  document.getElementById('done-section').classList.toggle('active', name === 'done');
  document.getElementById('error-section').classList.toggle('active', name === 'error');
}

function updateProgress(stage, pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
  const labels = {starting:'准备中',segments:'素材解析',transcripts:'语音识别',strategy:'策略生成',render:'视频渲染',complete:'完成'};
  document.getElementById('stage-text').textContent = (labels[stage] || stage) + ` (${pct}%)`;
  document.querySelectorAll('.stage-tag').forEach(el => {
    const s = el.dataset.stage, order = ['starting','segments','transcripts','strategy','render'];
    el.classList.toggle('done', order.indexOf(s) < order.indexOf(stage));
    el.classList.toggle('active', s === stage);
  });
}

function showDone(data) {
  showSection('done');
  document.getElementById('download-btn').href = `/api/tasks/${currentTaskId}/download`;
  document.getElementById('done-info').textContent = `品牌: ${data.brand} | 标签: ${data.labels.join('、')}`;
}

function showError(msg) { showSection('error'); document.getElementById('error-text').textContent = msg; }

function resetUI() {
  currentTaskId = null; selectedBrand = null; brandLabels = [];
  document.getElementById('variants-input').value = '1';
  document.getElementById('goal-input').value = '';
  document.getElementById('prompt-select').innerHTML = '<option value="">选择预设 Prompt（可选）</option>';
  showSection('brand'); loadBrands();
  if (pollTimer) clearTimeout(pollTimer);
}

async function toggleFilePanel(brand) {
  const panel = document.getElementById(`file-panel-${brand}`);
  const row = document.getElementById(`brand-row-${brand}`);

  if (manageExpandedBrand === brand) {
    panel.classList.remove('active');
    row.classList.remove('expanded');
    manageExpandedBrand = null;
    return;
  }

  // Close previous
  if (manageExpandedBrand) {
    const prev = document.getElementById(`file-panel-${manageExpandedBrand}`);
    const prevRow = document.getElementById(`brand-row-${manageExpandedBrand}`);
    if (prev) prev.classList.remove('active');
    if (prevRow) prevRow.classList.remove('expanded');
  }

  manageExpandedBrand = brand;
  panel.classList.add('active');
  row.classList.add('expanded');

  // Load files
  try {
    const resp = await fetch(`/api/brands/${encodeURIComponent(brand)}/files`);
    const files = await resp.json();
    renderFilePanel(brand, files);
  } catch (e) {
    panel.innerHTML = `<div style="color:#ff6b6b; font-size:13px;">加载失败: ${e.message}</div>`;
  }
}

function renderFilePanel(brand, files) {
  const panel = document.getElementById(`file-panel-${brand}`);
  let html = '';

  files.forEach(f => {
    const typeClass = f.type === 'xlsx' ? 'xlsx' : f.type === 'video' ? 'video' : '';
    html += `
      <div class="file-row">
        <div>
          <span class="file-name">${f.name}</span>
          <span class="file-size">${f.size_mb} MB</span>
          <span class="file-type ${typeClass}">${f.type}</span>
        </div>
        <button class="btn-delete-file" onclick="deleteFile('${brand}', '${f.name}')" title="删除">&times;</button>
      </div>
    `;
  });

  if (files.length === 0) {
    html = '<div style="color:#666; font-size:13px; padding:8px 0;">暂无文件</div>';
  }

  html += `
    <div class="upload-row">
      <label class="upload-btn">
        上传视频或切片方案 (.mp4 / .xlsx)
        <input type="file" accept=".mp4,.mov,.avi,.mkv,.xlsx,.MP4,.MOV,.AVI,.MKV,.XLSX" onchange="uploadFile('${brand}', this)">
      </label>
    </div>
  `;

  panel.innerHTML = html;
}

async function uploadFile(brand, input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  try {
    const resp = await fetch(`/api/brands/${encodeURIComponent(brand)}/files`, { method: 'POST', body: form });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail); }
    // Refresh
    toggleFilePanel(brand);
    setTimeout(() => toggleFilePanel(brand), 100);
    loadManageBrands();
  } catch (e) {
    alert('上传失败: ' + e.message);
  }
  input.value = '';
}

async function deleteFile(brand, filename) {
  if (!confirm(`确定删除 ${filename}？`)) return;
  try {
    const resp = await fetch(`/api/brands/${encodeURIComponent(brand)}/files/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail); }
    toggleFilePanel(brand);
    setTimeout(() => toggleFilePanel(brand), 100);
    loadManageBrands();
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

async function addPrompt(brand) {
  const name = document.getElementById(`new-prompt-name-${brand}`).value.trim();
  const content = document.getElementById(`new-prompt-content-${brand}`).value.trim();
  if (!name || !content) { alert('名称和内容不能为空'); return; }
  try {
    const resp = await fetch(`/api/brands/${encodeURIComponent(brand)}/prompts`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, content })
    });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail); }
    togglePromptPanel(brand);
    setTimeout(() => togglePromptPanel(brand), 100);
  } catch (e) { alert('添加失败: ' + e.message); }
}

function editPrompt(brand, pid, encName, encContent) {
  const name = decodeURIComponent(encName);
  const content = decodeURIComponent(encContent);
  const newName = prompt('Prompt 名称', name);
  if (newName === null) return;
  const newContent = prompt('Prompt 内容', content);
  if (newContent === null) return;
  fetch(`/api/brands/${encodeURIComponent(brand)}/prompts/${pid}`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name: newName, content: newContent })
  }).then(() => {
    togglePromptPanel(brand);
    setTimeout(() => togglePromptPanel(brand), 100);
  }).catch(e => alert('编辑失败: ' + e.message));
}

async function deletePrompt(brand, pid) {

  try {
    await fetch(`/api/brands/${encodeURIComponent(brand)}/prompts/${pid}`, { method: 'DELETE' });
    togglePromptPanel(brand);
    setTimeout(() => togglePromptPanel(brand), 100);

}

function _renderStorageBar(containerId, usedMb, limitMb, label) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const pct = limitMb > 0 ? Math.min(100, (usedMb / limitMb) * 100) : 0;
  const cls = pct >= 90 ? 'full' : pct >= 70 ? 'warn' : 'ok';
  const usedStr = usedMb >= 1024 ? (usedMb / 1024).toFixed(1) + ' GB' : Math.round(usedMb) + ' MB';
  const limitStr = limitMb >= 1024 ? (limitMb / 1024).toFixed(0) + ' GB' : Math.round(limitMb) + ' MB';
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:2px;">
      <span>${label} 存储</span><span class="bar-value">${usedStr} / ${limitStr}</span>
    </div>
    <div class="bar-row">
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
    </div>`;
}

async function loadStorage() {
  try {
    const resp = await fetch('/api/storage');
    const d = await resp.json();
    _renderStorageBar('storage-inputs', d.inputs.used_mb, d.inputs.limit_mb, '素材');
    _renderStorageBar('storage-output', d.output.used_mb, d.output.limit_mb, '成品');
  } catch (e) { console.error('loadStorage failed', e); }
}

                  <td>${(item.duration || (item.end - item.start)).toFixed(1)}s</td>
                  <td><span class="plan-role">${item.label || '-'}</span></td>
                  <td class="plan-reason">${item.reason || '-'}</td>
                </tr>
              `).join('')}
            </table>
          </div>
        `;
      } else {
        planHtml = '<div style="color:#666;font-size:13px;margin-bottom:12px;">无剪辑方案数据</div>';
      }

      // Feedback form
      const fb = v.feedback || {};
      const fbTags = ['节奏好', '内容准确', '画面流畅', '转场自然', '需要改进', '节奏拖沓', '内容不准', '画面跳跃'];
      const selectedTags = fb.tags || [];

      body.innerHTML = planHtml + `
        <div class="feedback-section">
          <div class="feedback-title">评价反馈</div>
          <div class="rating-stars" id="stars-${idx}">
            ${[1,2,3,4,5].map(n => `<button class="star ${n <= (fb.rating||0) ? 'filled' : ''}" onclick="setRating(${idx},${n})">&#9733;</button>`).join('')}
          </div>
          <div class="feedback-tags" id="fbtags-${idx}">
            ${fbTags.map(t => `<span class="feedback-tag ${selectedTags.includes(t) ? 'selected' : ''}" onclick="toggleFbTag(this)" data-tag="${t}">${t}</span>`).join('')}
          </div>
          <textarea class="feedback-textarea" id="fbtext-${idx}" placeholder="输入对这个视频的意见和建议...">${fb.comment || ''}</textarea>
          <div style="display:flex;align-items:center;gap:12px;">
            <button class="btn-feedback" onclick="submitFeedback('${brand}', '${v.name}', ${idx})">提交反馈</button>
            <span class="feedback-saved" id="fbsaved-${idx}">已保存</span>
          </div>
        </div>
      `;

      card.appendChild(body);
      list.appendChild(card);
    });
  } catch (e) {
    list.innerHTML = `<div style="color:#ff6b6b;">加载失败: ${e.message}</div>`;
  }
}

function fmtTime(sec) {
  if (sec == null) return '-';
  const m = Math.floor(sec / 60);
  const s = (sec % 60).toFixed(1);
  return m > 0 ? `${m}:${s.padStart(4,'0')}` : `${s}s`;
}

function toggleOutputBody(idx) {
  const body = document.getElementById(`output-body-${idx}`);
  body.classList.toggle('active');
}

function setRating(idx, n) {
  const stars = document.querySelectorAll(`#stars-${idx} .star`);
  stars.forEach((s, i) => s.classList.toggle('filled', i < n));
}

function toggleFbTag(el) {
  el.classList.toggle('selected');
}

async function submitFeedback(brand, filename, idx) {
  const rating = document.querySelectorAll(`#stars-${idx} .star.filled`).length;
  const comment = document.getElementById(`fbtext-${idx}`).value;
  const tags = [...document.querySelectorAll(`#fbtags-${idx} .feedback-tag.selected`)].map(el => el.dataset.tag);

  try {
    const resp = await fetch(`/api/brands/${encodeURIComponent(brand)}/outputs/${encodeURIComponent(filename)}/feedback`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ rating, comment, tags }),
    });
    if (!resp.ok) throw new Error('保存失败');
    const saved = document.getElementById(`fbsaved-${idx}`);
    saved.style.display = 'inline';
    setTimeout(() => saved.style.display = 'none', 2000);
  } catch (e) {
    alert('提交失败: ' + e.message);
  }
}

async function renameOutput(brand, oldName) {
  const newName = prompt('输入新名称:', oldName);
  if (!newName || newName === oldName) return;
  try {
    const resp = await fetch(`/api/brands/${encodeURIComponent(brand)}/outputs/${encodeURIComponent(oldName)}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name: newName }),
    });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail); }
    loadOutputs();
  } catch (e) {
    alert('重命名失败: ' + e.message);
  }
}

async function deleteOutput(brand, filename) {
  if (!confirm(`确定删除成品视频 ${filename}？`)) return;
  try {
    const resp = await fetch(`/api/brands/${encodeURIComponent(brand)}/outputs/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail); }
    loadOutputs();
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

</script>
